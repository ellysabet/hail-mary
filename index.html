<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 헤일메리 - 우주산업 진로탐험</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 라운드별 배경 테마 */
        body.round-1-bg { background: linear-gradient(135deg, rgba(30, 58, 138, 0.3) 0%, rgba(49, 46, 129, 0.3) 100%), linear-gradient(135deg, #0a0e27 0%, #1a1f4e 100%); }
        body.round-2-bg { background: linear-gradient(135deg, rgba(153, 27, 27, 0.3) 0%, rgba(124, 45, 18, 0.3) 100%), linear-gradient(135deg, #0a0e27 0%, #1a1f4e 100%); }
        body.round-3-bg { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(217, 119, 6, 0.2) 100%), linear-gradient(135deg, #0a0e27 0%, #1a1f4e 100%); }
        body.round-4-bg { background: linear-gradient(135deg, rgba(6, 95, 70, 0.3) 0%, rgba(6, 78, 59, 0.3) 100%), linear-gradient(135deg, #0a0e27 0%, #1a1f4e 100%); }
        body.round-5-bg { background: linear-gradient(135deg, rgba(30, 64, 175, 0.3) 0%, rgba(30, 58, 138, 0.3) 100%), linear-gradient(135deg, #0a0e27 0%, #1a1f4e 100%); }
        body.round-6-bg { background: linear-gradient(135deg, rgba(76, 29, 149, 0.3) 0%, rgba(91, 33, 182, 0.3) 100%), linear-gradient(135deg, #0a0e27 0%, #1a1f4e 100%); }
        
        /* 별 배경 */
        #starBg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* 우주 요소들 */
        .planet {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }
        
        .planet-1 {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a6f);
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }
        
        .planet-2 {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #fbbf24, #f59e0b);
            top: 60%;
            right: 10%;
            animation-delay: -5s;
        }
        
        .planet-3 {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #3b82f6, #1e40af);
            bottom: 15%;
            left: 15%;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }
        
        /* 혜성 */
        .comet {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
            animation: comet-move 8s linear infinite;
        }
        
        @keyframes comet-move {
            0% {
                top: -5%;
                right: -5%;
                opacity: 1;
            }
            100% {
                top: 105%;
                right: 105%;
                opacity: 0;
            }
        }
        
        .comet::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.8), transparent);
            transform: rotate(-45deg);
            transform-origin: 0 0;
        }
        
        /* 우주선 */
        .spaceship {
            position: absolute;
            font-size: 3rem;
            animation: ship-fly 20s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
            opacity: 0.7;
        }
        
        @keyframes ship-fly {
            0% {
                left: -10%;
                top: 20%;
                transform: rotate(-20deg);
            }
            25% {
                left: 25%;
                top: 40%;
                transform: rotate(5deg);
            }
            50% {
                left: 50%;
                top: 25%;
                transform: rotate(-10deg);
            }
            75% {
                left: 75%;
                top: 55%;
                transform: rotate(15deg);
            }
            100% {
                left: 110%;
                top: 35%;
                transform: rotate(-5deg);
            }
        }
        
        /* 메인 컨테이너 */
        .container {
            position: relative;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 카드 스타일 */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }
        
        .card-wide {
            max-width: 1200px;
        }
        
        .card-medium {
            max-width: 900px;
        }
        
        /* 타이틀 */
        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        
        h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        p {
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* 버튼 */
        .btn {
            width: 100%;
            padding: 16px 32px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 인풋 */
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            margin-top: 8px;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        input:focus {
            outline: none;
            border-color: #6c5ce7;
            background: rgba(255, 255, 255, 0.15);
        }
        
        label {
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        /* 세션 코드 표시 */
        .session-code {
            background: rgba(251, 191, 36, 0.2);
            border: 3px solid #fbbf24;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin: 20px 0;
        }
        
        .session-code-number {
            font-size: 3rem;
            font-weight: 700;
            color: #fbbf24;
            letter-spacing: 8px;
            margin: 10px 0;
        }
        
        /* 팀 카드 */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .team-card {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .team-card:hover {
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.2);
            transform: translateY(-4px);
        }
        
        .team-card.full {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .team-card.selected {
            border-color: #51cf66;
            background: rgba(81, 207, 102, 0.2);
        }
        
        /* 라운드 배지 */
        .round-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        /* 직업 카드 */
        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .job-card {
            padding: 20px;
            border-radius: 12px;
            border: 2px solid;
        }
        
        .job-card-blue {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }
        
        .job-card-green {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
        }
        
        .job-card-purple {
            background: rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.5);
        }
        
        .job-card-red {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }
        
        .job-card-orange {
            background: rgba(249, 115, 22, 0.2);
            border-color: rgba(249, 115, 22, 0.5);
        }
        
        .job-card-yellow {
            background: rgba(234, 179, 8, 0.2);
            border-color: rgba(234, 179, 8, 0.5);
        }
        
        /* 핵심 직업 강조 */
        .job-card-primary {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.3), rgba(162, 155, 254, 0.3));
            border: 3px solid #6c5ce7;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.5);
            transform: scale(1.05);
            position: relative;
        }
        
        .job-card-primary::before {
            content: '⭐ 핵심 직업';
            position: absolute;
            top: -12px;
            right: 10px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        /* 알림 박스 */
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            border: 2px solid;
        }
        
        .alert-info {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }
        
        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
        }
        
        .alert-warning {
            background: rgba(234, 179, 8, 0.2);
            border-color: rgba(234, 179, 8, 0.5);
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }
        
        /* 스토리 박스 */
        .story-box {
            background: rgba(168, 85, 247, 0.2);
            border: 2px solid rgba(168, 85, 247, 0.5);
            border-radius: 12px;
            padding: 24px;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        
        /* 퀴즈 선택지 */
        .quiz-option {
            width: 100%;
            text-align: left;
            padding: 16px;
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quiz-option:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .quiz-option.selected {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
        }
        
        .quiz-option.correct {
            background: rgba(34, 197, 94, 0.3);
            border-color: #22c55e;
        }
        
        .quiz-option.wrong {
            background: rgba(239, 68, 68, 0.3);
            border-color: #ef4444;
        }
        
        .quiz-option:disabled {
            cursor: not-allowed;
        }
        
        /* 미션 선택 버튼 */
        .mission-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 1rem;
        }
        
        .mission-btn {
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mission-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .mission-btn.selected {
            background: rgba(34, 197, 94, 0.3);
            border-color: #22c55e;
        }
        
        /* 교사 대시보드 */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .round-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 1rem;
        }
        
        .round-btn {
            padding: 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .round-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .round-btn.active {
            background: rgba(34, 197, 94, 0.5);
            border-color: #22c55e;
        }
        
        .team-list {
            margin-top: 1rem;
        }
        
        .team-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .team-item.selected {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3), rgba(52, 211, 153, 0.3));
            border: 2px solid #22c55e;
            transform: scale(1.02);
        }
        
        /* 유틸리티 */
        .text-center { text-align: center; }
        .text-small { font-size: 0.875rem; color: rgba(255, 255, 255, 0.6); }
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mb-2 { margin-bottom: 1rem; }
        .hidden { display: none; }
        
        .score-big {
            font-size: 3rem;
            font-weight: 700;
            color: #fbbf24;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
        }
        
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }
        
        .loading-dot {
            width: 12px;
            height: 12px;
            background: #fbbf24;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* 인트로 애니메이션 */
        .intro-animation {
            animation: fadeInUp 1s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 라운드 전환 애니메이션 */
        .round-transition {
            animation: zoomIn 0.5s ease-out;
        }
        
        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* 홈 화면 로고 애니메이션 */
        .logo-pulse {
            animation: logoPulse 2s ease-in-out infinite;
        }
        
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* Round 6 포스터 제작 툴 */
        .poster-maker {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        
        .template-select {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .template-btn {
            padding: 3rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .template-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }
        
        .template-btn.selected {
            background: rgba(168, 85, 247, 0.3);
            border-color: #a855f7;
        }
        
        .poster-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        .poster-textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            min-height: 80px;
            resize: vertical;
        }
        
        .color-picker {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .color-btn:hover {
            transform: scale(1.1);
        }
        
        .color-btn.selected {
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .icon-picker {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            font-size: 2rem;
        }
        
        .icon-item {
            cursor: grab;
            transition: transform 0.2s;
        }
        
        .icon-item:hover {
            transform: scale(1.2);
        }
        
        .icon-item:active {
            cursor: grabbing;
        }
        
        .poster-preview {
            background: white;
            color: #1a1f4e;
            border-radius: 12px;
            padding: 2rem;
            margin: 1.5rem 0;
            min-height: 400px;
            position: relative;
        }
        
        .poster-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .poster-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .poster-card:hover {
            transform: translateY(-4px);
            border-color: #a855f7;
        }
        
        .poster-card.voted {
            border-color: #f87171;
        }
        
        .vote-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(248, 113, 113, 0.9);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <!-- 별 배경 -->
    <div id="starBg"></div>
    
    <!-- 메인 컨테이너 -->
    <div class="container" id="app"></div>
    
    <script>
        // ========== 전역 변수 ==========
        let currentScreen = 'home';
        let currentSession = null;
        let studentData = null;
        
        // ========== 별 배경 생성 ==========
        function createStars() {
            const starBg = document.getElementById('starBg');
            starBg.innerHTML = ''; // 초기화
            
            // 별 생성
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starBg.appendChild(star);
            }
            
            // 행성 3개
            for (let i = 1; i <= 3; i++) {
                const planet = document.createElement('div');
                planet.className = `planet planet-${i}`;
                starBg.appendChild(planet);
            }
            
            // 혜성 2개
            for (let i = 0; i < 2; i++) {
                const comet = document.createElement('div');
                comet.className = 'comet';
                comet.style.animationDelay = i * 4 + 's';
                starBg.appendChild(comet);
            }
            
            // 우주선 1개

        // ========== 세션 코드 생성 ==========
        function generateSessionCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 혼동되는 문자 제외
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }
        
        // ========== 데이터 저장/불러오기 ==========
        function saveSession(code, data) {
            localStorage.setItem('session_' + code, JSON.stringify(data));
            // 변경 이벤트 발생시키기 (다른 탭 동기화용)
            window.dispatchEvent(new Event('storage'));
        }
        
        function loadSession(code) {
            const data = localStorage.getItem('session_' + code);
            return data ? JSON.parse(data) : null;
        }
        
        function saveTeams(code, teams) {
            localStorage.setItem('teams_' + code, JSON.stringify(teams));
            window.dispatchEvent(new Event('storage'));
        }
        
        function loadTeams(code) {
            const data = localStorage.getItem('teams_' + code);
            return data ? JSON.parse(data) : {};
        }

                            <h4 style="font-weight: 700; margin: 0.5rem 0;">우주 환경 보호 전문가</h4>
                            <p class="text-small">우주 생태계 모니터링</p>
                        </div>
                    </div>
                    
                    <div class="alert alert-info mt-2">
                        <p style="font-weight: 600;">👨‍🏫 교사 설명 시간</p>
                        <p class="text-small">선생님의 직업 설명을 듣고 캠페인 포스터를 만들어봅시다!</p>
                    </div>
                    
                    <button class="btn btn-primary mt-2" onclick="r6NextStage('mission')">다음: 미션 수행 →</button>
                `;
            } else if (stage === 'mission') {
                if (!submitted) {
                    content += `
                        <h3>🎯 미션: 우주 환경 캠페인 포스터 제작 (웹 미션)</h3>
                        <p>우주 쓰레기 문제를 해결하기 위한 캠페인 포스터를 만드세요!</p>
                        
                        <div class="poster-maker">
                            <h4 style="margin-bottom: 1rem;">1단계: 템플릿 선택</h4>
                            <div class="template-select">
                                <button class="template-btn ${template === 'info' ? 'selected' : ''}" onclick="r6SelectTemplate('info')">
                                    📊<br>인포그래픽
                                </button>
                                <button class="template-btn ${template === 'comic' ? 'selected' : ''}" onclick="r6SelectTemplate('comic')">
                                    💭<br>만화
                                </button>
                                <button class="template-btn ${template === 'minimal' ? 'selected' : ''}" onclick="r6SelectTemplate('minimal')">
                                    ✨<br>미니멀
                                </button>
                            </div>
                            
                            ${template ? `
                                <h4 style="margin-top: 2rem; margin-bottom: 1rem;">2단계: 내용 입력</h4>
                                <label style="margin-bottom: 0.5rem; display: block;">제목</label>
                                <input type="text" class="poster-input" id="posterTitle" 
                                       placeholder="예: 그물로 우주를 지키자!" 
                                       value="${posterData.title || ''}"
                                       onchange="r6UpdatePoster()">
                                
                                <label style="margin-bottom: 0.5rem; display: block;">문제 설명 (2-3줄)</label>
                                <textarea class="poster-textarea" id="posterProblem" 
                                          placeholder="우주 쓰레기가 왜 위험한지 설명하세요"
                                          onchange="r6UpdatePoster()">${posterData.problem || ''}</textarea>
                                
                                <label style="margin-bottom: 0.5rem; display: block;">해결 방법 (3-4줄)</label>
                                <textarea class="poster-textarea" id="posterSolution" 
                                          placeholder="우리 팀의 창의적인 해결 방법을 소개하세요"
                                          onchange="r6UpdatePoster()">${posterData.solution || ''}</textarea>
                                
                                <label style="margin-bottom: 0.5rem; display: block;">행동 촉구 (한 마디)</label>
                                <input type="text" class="poster-input" id="posterAction" 
                                       placeholder="예: 함께 우주를 지켜요!" 
                                       value="${posterData.action || ''}"
                                       onchange="r6UpdatePoster()">
                                
                                <h4 style="margin-top: 2rem; margin-bottom: 1rem;">3단계: 꾸미기</h4>
                                <label style="margin-bottom: 0.5rem; display: block;">배경색</label>
                                <div class="color-picker">
                                    <div class="color-btn ${posterData.bgColor === '#1e3a8a' ? 'selected' : ''}" 
                                         style="background: #1e3a8a" onclick="r6SelectColor('#1e3a8a')"></div>
                                    <div class="color-btn ${posterData.bgColor === '#7c2d12' ? 'selected' : ''}" 
                                         style="background: #7c2d12" onclick="r6SelectColor('#7c2d12')"></div>
                                    <div class="color-btn ${posterData.bgColor === '#065f46' ? 'selected' : ''}" 
                                         style="background: #065f46" onclick="r6SelectColor('#065f46')"></div>
                                    <div class="color-btn ${posterData.bgColor === '#7c3aed' ? 'selected' : ''}" 
                                         style="background: #7c3aed" onclick="r6SelectColor('#7c3aed')"></div>
                                </div>
                                
                                <div class="alert alert-success mt-2">
                                    <p style="font-weight: 600;">✅ 미리보기</p>
                                    <div class="poster-preview" style="background: ${posterData.bgColor || '#1e3a8a'}; color: white;">
                                        <h2 style="color: white; text-align: center; margin-bottom: 1.5rem;">${posterData.title || '제목을 입력하세요'}</h2>
                                        <div style="background: rgba(255,255,255,0.2); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                                            <strong>문제:</strong><br>${posterData.problem || '문제 설명을 입력하세요'}
                                        </div>
                                        <div style="background: rgba(255,255,255,0.2); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                                            <strong>해결:</strong><br>${posterData.solution || '해결 방법을 입력하세요'}
                                        </div>
                                        <div style="text-align: center; font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem;">
                                            ${posterData.action || '행동 촉구 문구를 입력하세요'}
                                        </div>
                                    </div>
                                </div>
                                
                                <button class="btn btn-primary mt-2" onclick="r6SubmitPoster()"
                                        ${!posterData.title || !posterData.problem || !posterData.solution || !posterData.action ? 'disabled' : ''}>
                                    포스터 제출하기 →
                                </button>
                            ` : `
                                <div class="alert alert-warning mt-2 text-center">
                                    <p>먼저 템플릿을 선택해주세요! ☝️</p>
                                </div>
                            `}
                        </div>
                    `;
                } else {
                    // 제출 완료 - 갤러리 투표
                    const teams = loadTeams(currentSession);
                    const posters = Object.entries(teams)
                        .filter(([id, t]) => t.round6 && t.round6.poster)
                        .map(([id, t]) => ({
                            teamId: id,
                            teamName: t.name,
                            poster: t.round6.poster,
                            votes: t.round6.votes || 0
                        }));
                    
                    content += `
                        <h3>🎨 갤러리 투표</h3>
                        <p>다른 팀의 포스터를 확인하고 좋은 포스터에 투표하세요! (최대 2표)</p>
                        
                        <div class="poster-gallery">
                            ${posters.map(p => `
                                <div class="poster-card" onclick="r6VotePoster('${p.teamId}')">
                                    <div class="vote-count">❤️ ${p.votes}</div>
                                    <h4 style="margin-bottom: 1rem;">${p.teamName}</h4>
                                    <div style="background: ${p.poster.bgColor}; color: white; padding: 1rem; border-radius: 8px; min-height: 200px;">
                                        <h5 style="color: white; text-align: center; margin-bottom: 0.5rem;">${p.poster.title}</h5>
                                        <p style="font-size: 0.8rem; margin-bottom: 0.5rem;"><strong>문제:</strong> ${p.poster.problem.substring(0, 50)}...</p>
                                        <p style="font-size: 0.8rem;"><strong>해결:</strong> ${p.poster.solution.substring(0, 50)}...</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <button class="btn btn-primary mt-2" onclick="r6NextStage('quiz')">
                            투표 완료 - 퀴즈로 이동 →
                        </button>
                    `;
                }
            } else if (stage === 'quiz') {
                const options = [
                    '1,000개',
                    '10,000개',
                    '100,000개',
                    '1,000,000개'
                ];
                
                content += `
                    <h3>❓ 퀴즈</h3>
                    <div class="alert alert-info">
                        <p style="font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem;">
                            현재 지구 궤도상의 우주 쓰레기는 약 몇 개?
                        </p>
                        ${options.map((opt, i) => {
                            let className = 'quiz-option';
                            if (quizAnswer == i) className += ' selected';
                            if (quizSubmitted) {
                                if (i === 3) className += ' correct';
                                else if (quizAnswer == i) className += ' wrong';
                            }
                            return `
                                <button class="quiz-option ${className}" 
                                        onclick="${quizSubmitted ? '' : `r6SelectQuiz(${i})`}"
                                        ${quizSubmitted ? 'disabled' : ''}>
                                    ${i + 1}. ${opt}
                                    ${quizSubmitted && i === 3 ? ' ✓ 정답' : ''}
                                    ${quizSubmitted && quizAnswer == i && i !== 3 ? ' ✗' : ''}
                                </button>
                            `;
                        }).join('')}
                    </div>
                    
                    ${!quizSubmitted ? `
                        <button class="btn btn-primary mt-2" 
                                onclick="r6SubmitQuiz()" 
                                ${quizAnswer === '' ? 'disabled' : ''}>
                            답안 제출하기
                        </button>
                    ` : `
                        <div class="alert ${quizAnswer == 3 ? 'alert-success' : 'alert-error'} mt-2 text-center">
                            <div style="font-size: 3rem;">${quizAnswer == 3 ? '🎉' : '😢'}</div>
                            <p style="font-size: 1.3rem; font-weight: 700;">${quizAnswer == 3 ? '정답입니다!' : '아쉽네요!'}</p>
                            <p>${quizAnswer == 3 ? '250점 획득! 모든 라운드 완료!' : '아쉽지만 모든 라운드를 완료했습니다!'}</p>
                            <div class="mt-2 text-center">
                                <p style="font-size: 1.5rem; font-weight: 700; color: #fbbf24;">🏆 최종 점수: ${team.totalScore + (quizAnswer == 3 ? 250 : 0)}점</p>
                            </div>
                        </div>
                    `}
                `;
            }
            
            content += `</div>`;
            return content;
        }
        
        // ========== Round 3 함수 ==========
        function r3NextStage(stage) {
            sessionStorage.setItem('r3_stage', stage);
            render();
        }
        
        function r3SelectQuiz(index) {
            sessionStorage.setItem('r3_quiz', index);
            render();
        }
        
        function r3SubmitQuiz() {
            const answer = sessionStorage.getItem('r3_quiz');
            const teams = loadTeams(currentSession);
            const team = teams[studentData.teamId];
            
            const isCorrect = answer == 1;
            const score = isCorrect ? 150 : 0;
            
            team.round3 = {
                answer: answer,
                isCorrect: isCorrect,
                score: score,
                submittedAt: new Date().toISOString()
            };
            
            team.totalScore = (team.totalScore || 0) + score;
            teams[studentData.teamId] = team;
            saveTeams(currentSession, teams);
            
            sessionStorage.setItem('r3_submitted', 'true');
            render();
        }
        
        // ========== Round 4 함수 ==========
        function r4NextStage(stage) {
            sessionStorage.setItem('r4_stage', stage);
            render();
        }
        
        function r4SelectQuiz(index) {
            sessionStorage.setItem('r4_quiz', index);
            render();
        }
        
        function r4SubmitQuiz() {
            const answer = sessionStorage.getItem('r4_quiz');
            const teams = loadTeams(currentSession);
            const team = teams[studentData.teamId];
            
            const isCorrect = answer == 1;
            const score = isCorrect ? 200 : 0;
            
            team.round4 = {
                answer: answer,
                isCorrect: isCorrect,
                score: score,
                submittedAt: new Date().toISOString()
            };
            
            team.totalScore = (team.totalScore || 0) + score;
            teams[studentData.teamId] = team;
            saveTeams(currentSession, teams);
            
            sessionStorage.setItem('r4_submitted', 'true');
            render();
        }
        
        // ========== Round 5 함수 ==========
        function r5NextStage(stage) {
            sessionStorage.setItem('r5_stage', stage);
            render();
        }
        
        function r5SelectQuiz(index) {
            sessionStorage.setItem('r5_quiz', index);
            render();
        }
        
        function r5SubmitQuiz() {
            const answer = sessionStorage.getItem('r5_quiz');
            const teams = loadTeams(currentSession);
            const team = teams[studentData.teamId];
            
            const isCorrect = answer == 1;
            const score = isCorrect ? 200 : 0;
            
            team.round5 = {
                answer: answer,
                isCorrect: isCorrect,
                score: score,
                submittedAt: new Date().toISOString()
            };
            
            team.totalScore = (team.totalScore || 0) + score;
            teams[studentData.teamId] = team;
            saveTeams(currentSession, teams);
            
            sessionStorage.setItem('r5_submitted', 'true');
            render();
        }
        
        // ========== Round 6 함수 ==========
        function r6NextStage(stage) {
            sessionStorage.setItem('r6_stage', stage);
            render();
        }
        
        function r6SelectTemplate(template) {
            sessionStorage.setItem('r6_template', template);
            render();
        }
        
        function r6UpdatePoster() {
            const posterData = {
                title: document.getElementById('posterTitle')?.value || '',
                problem: document.getElementById('posterProblem')?.value || '',
                solution: document.getElementById('posterSolution')?.value || '',
                action: document.getElementById('posterAction')?.value || '',
                bgColor: JSON.parse(sessionStorage.getItem('r6_poster') || '{}').bgColor || '#1e3a8a',
                template: sessionStorage.getItem('r6_template') || ''
            };
            sessionStorage.setItem('r6_poster', JSON.stringify(posterData));
            render();
        }
        
        function r6SelectColor(color) {
            const posterData = JSON.parse(sessionStorage.getItem('r6_poster') || '{}');
            posterData.bgColor = color;
            sessionStorage.setItem('r6_poster', JSON.stringify(posterData));
            render();
        }
        
        function r6SubmitPoster() {
            const posterData = JSON.parse(sessionStorage.getItem('r6_poster') || '{}');
            
            if (!posterData.title || !posterData.problem || !posterData.solution || !posterData.action) {
                alert('모든 항목을 입력해주세요!');
                return;
            }
            
            const teams = loadTeams(currentSession);
            const team = teams[studentData.teamId];
            
            team.round6 = {
                poster: posterData,
                votes: 0,
                submittedAt: new Date().toISOString()
            };
            
            teams[studentData.teamId] = team;
            saveTeams(currentSession, teams);
            
            sessionStorage.setItem('r6_submitted', 'true');
            alert('포스터가 제출되었습니다! 🎉');
            render();
        }
        
        function r6VotePoster(teamId) {
            if (teamId === studentData.teamId) {
                alert('자기 팀에는 투표할 수 없습니다!');
                return;
            }
            
            const teams = loadTeams(currentSession);
            const myTeam = teams[studentData.teamId];
            
            // 투표 기록 확인
            if (!myTeam.round6.votedFor) {
                myTeam.round6.votedFor = [];
            }
            
            if (myTeam.round6.votedFor.length >= 2) {
                alert('최대 2표까지만 가능합니다!');
                return;
            }
            
            if (myTeam.round6.votedFor.includes(teamId)) {
                alert('이미 투표한 팀입니다!');
                return;
            }
            
            // 투표 실행
            myTeam.round6.votedFor.push(teamId);
            teams[teamId].round6.votes = (teams[teamId].round6.votes || 0) + 1;
            
            saveTeams(currentSession, teams);
            alert('투표 완료! ❤️');
            render();
        }
        
        function r6SelectQuiz(index) {
            sessionStorage.setItem('r6_quiz', index);
            render();
        }
        
        function r6SubmitQuiz() {
            const answer = sessionStorage.getItem('r6_quiz');
            const teams = loadTeams(currentSession);
            const team = teams[studentData.teamId];
            
            const isCorrect = answer == 3;
            const score = isCorrect ? 250 : 0;
            
            if (!team.round6) team.round6 = {};
            
            team.round6.quizAnswer = answer;
            team.round6.isCorrect = isCorrect;
            team.round6.score = score;
            team.round6.quizSubmittedAt = new Date().toISOString();
            
            team.totalScore = (team.totalScore || 0) + score;
            teams[studentData.teamId] = team;
            saveTeams(currentSession, teams);
            
            sessionStorage.setItem('r6_quiz_submitted', 'true');
            render();
        }
        
        // ========== 초기화 ==========
        createStars();
        render();
    </script>
</body>
</html>
